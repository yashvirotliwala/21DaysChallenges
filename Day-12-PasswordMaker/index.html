<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Generator</title><!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assests/css/style.css">
</head>

<body>
    <div class="overlay"></div>
    <div class="container">
        <div class="card">
            <div class="top">
                <h2>🔐 Password Generator</h2>
                <p>Create strong secure passwords instantly</p>
            </div>
            <div class="password-box"> <input type="text" id="password" readonly placeholder="Generate Password">
                <button id="copyBtn">Copy</button> </div>
            <div class="range-box"> <label>Password Length <span id="lengthValue">12</span></label> <input type="range"
                    min="6" max="30" value="12" id="length"> </div>
            <div class="options"> <label><input type="checkbox" id="uppercase" checked> Uppercase</label> <label><input
                        type="checkbox" id="lowercase" checked> Lowercase</label> <label><input type="checkbox"
                        id="numbers" checked> Numbers</label> <label><input type="checkbox" id="symbols">
                    Symbols</label> </div> <button class="generate-btn" onclick="generatePassword()"> Generate Password
            </button>
            <div class="strength"> <span>Strength:</span>
                <div class="bar">
                    <div id="strengthBar"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="assests/js/script.js"></script>
</body>

</html>
