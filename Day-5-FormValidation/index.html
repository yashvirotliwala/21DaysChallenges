<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Form Validation</title>

    <link rel="stylesheet" href="./assests/css/bootstrap.min.css">
    <link rel="stylesheet" href="./assests/css/style.css">
</head>

<body>

    <div class="container py-4">

        <div class="row main-box g-0 align-items-stretch">

            <div class="col-lg-5 col-md-12 left">
                <div class="left-content">
                    <h1>Welcome Back!</h1>
                    <p>To keep connected with us please login with your personal info</p>
                    <button onclick="focusName()" class="sign">SIGN IN</button>
                </div>
            </div>


            <div class="col-lg-7 col-md-12 right">
                <h1>Create Account</h1>

                <div class="social mb-3">
                    <span>f</span>
                    <span>G+</span>
                    <span>in</span>
                </div>

                <p>or use your email for registration:</p>

                <form id="myForm">

                    <div class="input-box">
                        <input type="text" id="fname" placeholder="First Name">
                    </div>

                    <div class="input-box">
                        <input type="text" id="lname" placeholder="Last Name">
                    </div>

                    <div class="input-box">
                        <input type="text" id="email" placeholder="Email">
                    </div>

                    <div class="input-box">
                        <input type="text" id="phone" placeholder="Phone Number">
                    </div>

                    <div class="input-box">
                        <input type="password" id="password" placeholder="Password">
                    </div>

                    <div class="input-box">
                        <input type="password" id="cpassword" placeholder="Confirm Password">
                    </div>

                    <button class="signup-btn">SIGN UP</button>

                </form>
            </div>

        </div>
    </div>

    <div class="popup" id="popup">
        <div class="popup-box">
            <div class="icon">✖</div>
            <h2 id="msg"></h2>
            <button onclick="closePopup()">OK</button>
        </div>
    </div>

    <script src="./assests/js/bootstrap.bundle.min.js"></script>
    <script src="./assests/js/script.js"></script>

</body>

</html>
