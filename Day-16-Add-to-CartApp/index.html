<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Cart Store</title>
<link rel="stylesheet" href="./assests/css/style.css">
</head>
<body>

<header class="navbar">
    <button class="back-btn" onclick="goBackHome()">← Back</button>

    <h2>LuxCart</h2>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search products...">
        <button onclick="searchProduct()">Search</button>
    </div>

    <button class="cart-btn" onclick="openCart()">
        🛒 Cart <span id="cartCount">0</span>
    </button>
</header>

<section class="hero">
    <h1>Premium Shopping Experience</h1>
    <p>Luxury products with modern UI design</p>
</section>

<section class="products" id="productList"></section>

<!-- CART -->
<div class="cart-panel" id="cartPanel">

<div class="cart-header">
<h2>Your Cart</h2>
<button onclick="closeCart()">✕</button>
</div>

<div id="cartItems"></div>

<div class="cart-footer">
<h3>Total: $<span id="totalPrice">0</span></h3>
<button class="checkout">Checkout</button>
</div>

</div>

<script src="assests/js/script.js"></script>
</body>
</html>
