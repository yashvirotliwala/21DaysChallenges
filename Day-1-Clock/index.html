<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Digital Clock UI</title>
  <link rel="stylesheet" href="./assests/css/style.css">
</head>
<body>

  <div class="container">

    <!-- Pink Shape -->
    <div class="shape pink"></div>

    <!-- Blue Shape -->
    <div class="shape blue"></div>

    <!-- Clock Box -->
    <div class="clock-box">
      <div class="fullDay">
        <span id="day"></span>
        <span id="date"></span>,
        <span id="year"></span>
      </div>
      <div class="time">
        <div>
          <h1 id="hours">00</h1>
          <p>HOURS</p>
        </div>
        <span>:</span>
        <div>
          <h1 id="min">00</h1>
          <p>MINS</p>
        </div>
        <span>:</span>
        <div>
          <h1 id="sec">00</h1>
          <p>SEC</p>
        </div>
      </div>
      
    </div>

  </div>

  <script src="./assests/js/script.js"></script>
</body>
</html>
