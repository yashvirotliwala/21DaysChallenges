<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Slider Animation</title>

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="./assests/css/bootstrap.min.css">
    <link rel="stylesheet" href="./assests/css/style.css">

</head>

<body>

    <h1 class="slider-title text-center mt-4">Image Slider Animation</h1>

    <div class="slider pt-5">
    <span id="prev"><i class="ri-arrow-left-double-fill"></i></span>

    <div class="slide-container">
        <img id="fade-image" src="" alt="">
    </div>

    <span id="next"><i class="ri-arrow-right-double-line"></i></span>
</div>

    <script src="./assests/js/script.js"></script>
</body>

</html>
